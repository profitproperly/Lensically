name: Lensically Cloudflare Pages Deploy
run-name: Deploy ${{ inputs.repository }} · ${{ inputs.operation_id }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        required: true
        type: string
      project_name:
        required: true
        type: string
      repository:
        required: true
        type: string
      branch:
        required: true
        default: main
        type: string
      directory:
        required: true
        default: site
        type: string

concurrency:
  group: lensically-pages-deploy-${{ inputs.project_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout sales repository
        uses: actions/checkout@v4
        with:
          repository: profitproperly/${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          path: target

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Pages directory
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BRANCH: ${{ inputs.branch }}
          DIRECTORY: ${{ inputs.directory }}
        run: |
          set -euo pipefail
          test -d "target/${DIRECTORY}"
          npx --yes wrangler@4 pages deploy "target/${DIRECTORY}" --project-name "${PROJECT_NAME}" --branch "${BRANCH}"
