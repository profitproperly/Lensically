name: Lensically Cloudflare Pages
run-name: Pages ${{ inputs.project_name }} · ${{ inputs.operation_id }}

on:
  workflow_dispatch:
    inputs:
      operation_id:
        description: Idempotent provisioning operation
        required: true
        type: string
      project_name:
        description: Cloudflare Pages project name
        required: true
        type: string
      production_branch:
        description: Production branch
        required: true
        default: main
        type: string

concurrency:
  group: lensically-pages-${{ inputs.project_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout provisioning script
        uses: actions/checkout@v4

      - name: Create or reconcile Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PRODUCTION_BRANCH: ${{ inputs.production_branch }}
          OPERATION_ID: ${{ inputs.operation_id }}
        run: node lensically-worker/scripts/create-cloudflare-pages-project.mjs
