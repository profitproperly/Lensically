name: Lensically Engineering

on:
  workflow_dispatch:
    inputs:
      task:
        description: Engineering task to run
        required: true
        default: typecheck
        type: choice
        options:
          - typecheck
          - operator-tests
          - gpt-memory-tests
          - worker-deploy

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        if: ${{ inputs.task == 'typecheck' || inputs.task == 'worker-deploy' }}
        run: npx tsc --noEmit

      - name: Operator MCP tests
        if: ${{ inputs.task == 'operator-tests' }}
        run: npm run test -- --run test/operatorMode.spec.ts --reporter=dot

      - name: GPT memory tests
        if: ${{ inputs.task == 'gpt-memory-tests' }}
        run: npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot

      - name: Deploy worker
        if: ${{ inputs.task == 'worker-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:${{ github.sha }}"
