name: Lensically Engineering
run-name: Lensically ${{ inputs.task }} · ${{ inputs.release_id || github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - "lensically-recovery-worker/**"
      - ".github/workflows/lensically-engineering.yml"
  workflow_dispatch:
    inputs:
      task:
        description: Engineering task to run
        required: true
        default: typecheck
        type: choice
        options:
          - typecheck
          - operator-tests
          - gpt-memory-tests
          - worker-deploy
      release_id:
        description: Optional exact-SHA release identity
        required: false
        default: ""
        type: string
      release_sha:
        description: Exact commit SHA to validate and deploy
        required: false
        default: ""
        type: string

concurrency:
  group: lensically-engineering-${{ inputs.task || 'recovery-push' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  worker:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Verify exact release identity
        if: ${{ inputs.task == 'worker-deploy' && inputs.release_sha != '' }}
        run: test "$(git rev-parse HEAD)" = "${{ inputs.release_sha }}"

      - name: Fast release preflight
        if: ${{ inputs.task == 'worker-deploy' }}
        run: node scripts/release-preflight.mjs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: worker-dependency-cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: ${{ steps.worker-dependency-cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Typecheck
        if: ${{ inputs.task == 'typecheck' || inputs.task == 'worker-deploy' }}
        run: npx tsc --noEmit

      - name: Operator MCP tests
        id: operator_tests
        if: ${{ inputs.task == 'operator-tests' || inputs.task == 'worker-deploy' }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test -- --run test/operatorMode.spec.ts --reporter=verbose 2>&1 | tee /tmp/lensically-operator-tests.log

      - name: Surface Operator test failure
        if: ${{ steps.operator_tests.outcome == 'failure' }}
        run: |
          echo "Operator MCP tests failed. Bounded diagnostic tail follows."
          tail -n 120 /tmp/lensically-operator-tests.log | while IFS= read -r line; do
            safe_line=${line//'%'/'%25'}
            safe_line=${safe_line//
      - name: Deploy worker
        if: ${{ inputs.task == 'worker-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:$(git rev-parse HEAD)"

      - name: Verify Wrangler-managed cron triggers
        if: ${{ inputs.task == 'worker-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          schedules_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/lensically-worker/schedules"
          curl --fail-with-body --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${schedules_url}" > /tmp/lensically-cron-get.json
          jq -e '.success == true' /tmp/lensically-cron-get.json > /dev/null
          expected_crons=$(node scripts/release-preflight.mjs --print-crons | sort)
          actual_crons=$(jq -r '.result.schedules[].cron' /tmp/lensically-cron-get.json | sort)
          test "${actual_crons}" = "${expected_crons}"
          echo "Wrangler-managed Cloudflare cron triggers verified from wrangler.jsonc without mutation."

      - name: Verify safe scheduler activation state
        if: ${{ inputs.task == 'worker-deploy' }}
        run: |
          set -euo pipefail
          scheduler_url="https://api.lensically.com/api/operator/scheduler-health"
          scheduler_safe=false
          for attempt in $(seq 1 12); do
            if curl --fail-with-body --silent --show-error "${scheduler_url}" > /tmp/lensically-scheduler-health.json \
              && jq -e '.enabled == true and ((.control.mode == "paused") or (.control.mode == "canary") or ((.control.mode == "normal") and ((.current_overdue_count | type) == "number") and (.current_overdue_count == 0)))' /tmp/lensically-scheduler-health.json > /dev/null; then
              scheduler_safe=true
              break
            fi
            echo "Waiting for scheduler-health propagation (${attempt}/12)..."
            sleep 5
          done
          if [ "${scheduler_safe}" != "true" ]; then
            echo "Scheduler activation state did not become safely verifiable."
            cat /tmp/lensically-scheduler-health.json || true
            exit 1
          fi
          echo "Scheduler activation state verified: paused/canary, or normal with an empty overdue queue."


  recovery:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-recovery-worker
    steps:
      - name: Checkout
