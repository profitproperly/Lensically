name: Lensically Engineering
run-name: Lensically ${{ inputs.task || 'push-validation' }} · ${{ inputs.release_id || github.sha }}

on:
  push:
    branches: [main]
    paths:
      - "lensically-worker/**"
      - ".github/workflows/lensically-engineering.yml"
  workflow_dispatch:
    inputs:
      task:
        description: Validation or release task
        required: true
        default: typecheck
        type: choice
        options:
          - typecheck
          - operator-smoke
          - operator-tests
          - system-directory-tests
          - threads-publish-tests
          - gpt-memory-tests
          - worker-deploy
      release_id:
        description: Compact exact-SHA release identity
        required: false
        default: ""
        type: string
      release_sha:
        description: Exact commit SHA to validate or deploy
        required: false
        default: ""
        type: string

concurrency:
  group: lensically-engineering-${{ github.event_name }}-${{ inputs.task || 'push' }}
  cancel-in-progress: ${{ inputs.task != 'worker-deploy' }}

permissions:
  contents: read
  actions: write

jobs:
  fast-validation:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.task != 'operator-tests' && inputs.task != 'worker-deploy') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: worker-cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: ${{ steps.worker-cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Typecheck and lifecycle gate
        run: |
          set -euo pipefail
          npx tsc --noEmit
          node scripts/release-preflight.mjs --capability-lifecycle-only

      - name: Run selected fast validation
        env:
          TASK: ${{ inputs.task || 'operator-smoke' }}
        run: |
          set -euo pipefail
          case "${TASK}" in
            typecheck) ;;
                        operator-smoke)
              node scripts/run-operator-validation.mjs smoke
              npm run test -- --run manifest-autonomous-cycle.test.ts --reporter=dot --bail=1
              ;;
            system-directory-tests) npm run test -- --run test/systemDirectory.spec.ts --reporter=dot --bail=1 ;;
            threads-publish-tests) npm run test -- --run test/threadsPublishService.spec.ts --reporter=dot --bail=1 ;;
            gpt-memory-tests) npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot --bail=1 ;;
            *) echo "Unsupported fast-validation task: ${TASK}"; exit 2 ;;
          esac

  operator-test-shards:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.task == 'operator-tests' }}
    name: Operator shard ${{ matrix.shard }}/8
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: operator-cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: ${{ steps.operator-cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Verify lifecycle and run deterministic shard
        run: |
          set -euo pipefail
          node scripts/release-preflight.mjs --capability-lifecycle-only
          node scripts/run-operator-shard.mjs "${{ matrix.shard }}" 8

  worker-release:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.task == 'worker-deploy' && inputs.release_sha != '' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout exact release head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}

      - name: Verify exact release identity
        run: test "$(git rev-parse HEAD)" = "${{ inputs.release_sha }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: release-cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: ${{ steps.release-cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Run exact-head release gates
        run: |
          set -euo pipefail
                    node scripts/release-preflight.mjs
          npx tsc --noEmit
          npm run test -- --run manifest-autonomous-cycle.test.ts --reporter=dot --bail=1
          npm run test -- --run test/systemDirectory.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/threadsPublishService.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/operatorMode.spec.ts --testNamePattern="advertises the curated direct typed Main surface and concise instructions|makes the static router the only public action path|routes operational status and engineering intents deterministically away from content procedures|routes bounded known-file repository search through the main Execution Kernel without Recovery|builds one complete non-mutating Execution Kernel capability campaign|rejects an MCP session created by a previous Worker deployment before routing|lists only the active static MCP registry and concise instructions|arms, executes, and re-arms the independent scheduled-post alarm with shared cron health|recovers a known Saved Pattern into complete published-post lineage|reconciles prepare_manifest_autonomous_cycle again with the same durable operation id" --reporter=dot --bail=1




      - name: Deploy exact validated Worker head
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:$(git rev-parse HEAD)"

      - name: Verify Wrangler-managed cron triggers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          schedules_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/lensically-worker/schedules"
          curl --fail-with-body --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${schedules_url}" > /tmp/lensically-cron-get.json
          jq -e '.success == true' /tmp/lensically-cron-get.json > /dev/null
          expected_crons=$(node scripts/release-preflight.mjs --print-crons | sort)
          actual_crons=$(jq -r '.result.schedules[].cron' /tmp/lensically-cron-get.json | sort)
          test "${actual_crons}" = "${expected_crons}"

      - name: Verify production runtime and scheduler
        run: |
          set -euo pipefail
          expected_sha="$(git rev-parse HEAD)"
          verified=false
          for attempt in $(seq 1 12); do
            if curl --fail-with-body --silent --show-error "https://api.lensically.com/api/operator/health" > /tmp/lensically-runtime-health.json \
              && jq -e --arg sha "${expected_sha}" '.status == "ok" and .commit_sha == $sha and .execution_kernel.public_gateway == "direct_typed_tools" and .live_tool_count == 87' /tmp/lensically-runtime-health.json > /dev/null \
              && curl --fail-with-body --silent --show-error "https://api.lensically.com/api/operator/scheduler-health" > /tmp/lensically-scheduler-health.json \
              && jq -e '.enabled == true and .healthy == true and .operational == true and .heartbeat_fresh == true and (.control.mode == "normal") and (.current_overdue_count == 0)' /tmp/lensically-scheduler-health.json > /dev/null; then
              verified=true
              break
            fi
            sleep 5
          done
          if [ "${verified}" != "true" ]; then
            cat /tmp/lensically-runtime-health.json || true
            cat /tmp/lensically-scheduler-health.json || true
            exit 1
          fi
