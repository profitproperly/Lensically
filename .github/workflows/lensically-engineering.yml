name: Lensically Engineering
run-name: Lensically ${{ inputs.task || 'push-validation' }} · ${{ inputs.release_id || github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - "lensically-worker/**"
      - "lensically-web/**"
      - ".github/workflows/lensically-engineering.yml"
  workflow_dispatch:
    inputs:
      task:
        description: Validation or release task
        required: true
        default: typecheck
        type: choice
        options:
          - typecheck
          - operator-smoke
          - operator-tests
          - system-directory-tests
          - threads-publish-tests
                              - gpt-memory-tests
          - worker-deploy
          - cloudflare-pages-project-create
      release_id:
        description: Compact exact-SHA release identity
        required: false
        default: ""
        type: string
                  release_sha:
        description: Exact commit SHA to validate or deploy
        required: false
        default: ""
        type: string
      project_name:
        description: Cloudflare Pages project name
        required: false
        default: ""
        type: string
      production_branch:
        description: Cloudflare Pages production branch
        required: false
        default: "main"
        type: string

concurrency:
  group: lensically-engineering-${{ github.event_name }}-${{ inputs.task || 'push' }}-${{ inputs.release_id || github.sha }}
  cancel-in-progress: ${{ inputs.task != 'worker-deploy' && inputs.task != 'cloudflare-pages-project-create' }}

permissions:
  contents: read
  actions: write

jobs:
  push-validation:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed head
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            lensically-worker/package-lock.json
            lensically-web/package-lock.json

      - name: Restore worker dependencies
        id: push_worker_cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: steps.push_worker_cache.outputs.cache-hit != 'true'
        working-directory: lensically-worker
        run: npm ci

      - name: Restore web dependencies
        id: push_web_cache
        uses: actions/cache@v4
        with:
          path: lensically-web/node_modules
          key: ${{ runner.os }}-node22-web-${{ hashFiles('lensically-web/package-lock.json') }}

      - name: Install web dependencies
        if: steps.push_web_cache.outputs.cache-hit != 'true'
        working-directory: lensically-web
        run: npm ci

      - name: Build web product surface
        working-directory: lensically-web
        run: npm run build

      - name: Typecheck and lifecycle gate
        working-directory: lensically-worker
        run: |
          set -euo pipefail
          npx tsc --noEmit
          node scripts/release-preflight.mjs --capability-lifecycle-only

      - name: Run push smoke validation
        working-directory: lensically-worker
        run: |
          set -euo pipefail
          node scripts/run-operator-validation.mjs smoke
          npm run test -- --run manifest-autonomous-cycle.test.ts --reporter=dot --bail=1

  fast-validation:
    if: >-
            github.event_name == 'workflow_dispatch' &&
      inputs.task != 'operator-tests' &&
      inputs.task != 'worker-deploy' &&
      inputs.task != 'cloudflare-pages-project-create'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            lensically-worker/package-lock.json
            lensically-web/package-lock.json

      - name: Restore worker dependencies
        id: worker_cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: steps.worker_cache.outputs.cache-hit != 'true'
        working-directory: lensically-worker
        run: npm ci

      - name: Restore web dependencies
        id: web_cache
        uses: actions/cache@v4
        with:
          path: lensically-web/node_modules
          key: ${{ runner.os }}-node22-web-${{ hashFiles('lensically-web/package-lock.json') }}

      - name: Install web dependencies
        if: steps.web_cache.outputs.cache-hit != 'true'
        working-directory: lensically-web
        run: npm ci

      - name: Build web product surface
        working-directory: lensically-web
        run: npm run build

      - name: Typecheck and lifecycle gate
        working-directory: lensically-worker
        run: |
          set -euo pipefail
          npx tsc --noEmit
          node scripts/release-preflight.mjs --capability-lifecycle-only

      - name: Run selected fast validation
        working-directory: lensically-worker
        env:
          TASK: ${{ inputs.task }}
        run: |
          set -euo pipefail
          case "${TASK}" in
            typecheck) ;;
            operator-smoke)
              node scripts/run-operator-validation.mjs smoke
              npm run test -- --run manifest-autonomous-cycle.test.ts --reporter=dot --bail=1
              ;;
            system-directory-tests)
              npm run test -- --run test/systemDirectory.spec.ts --reporter=dot --bail=1
              ;;
            threads-publish-tests)
              npm run test -- --run test/threadsPublishService.spec.ts --reporter=dot --bail=1
              ;;
            gpt-memory-tests)
              npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot --bail=1
              ;;
            *)
              echo "Unsupported fast-validation task: ${TASK}"
              exit 2
              ;;
          esac

  operator-test-shards:
    if: github.event_name == 'workflow_dispatch' && inputs.task == 'operator-tests'
    name: Operator shard ${{ matrix.shard }}/8
    strategy:
      fail-fast: true
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: operator_cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: steps.operator_cache.outputs.cache-hit != 'true'
        working-directory: lensically-worker
        run: npm ci

      - name: Verify lifecycle and run deterministic shard
        working-directory: lensically-worker
        run: |
          set -euo pipefail
          node scripts/release-preflight.mjs --capability-lifecycle-only
          node scripts/run-operator-shard.mjs "${{ matrix.shard }}" 8

    cloudflare-pages-project-create:
    if: github.event_name == 'workflow_dispatch' && inputs.task == 'cloudflare-pages-project-create'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Reconcile Cloudflare Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ inputs.project_name }}
          PRODUCTION_BRANCH: ${{ inputs.production_branch }}
        run: |
          set -euo pipefail
          project="${PROJECT_NAME}"
          branch="${PRODUCTION_BRANCH}"
          if ! [[ "${project}" =~ ^[a-z0-9]([a-z0-9-]{0,56}[a-z0-9])?$ ]]; then
            echo "Invalid Cloudflare Pages project name"
            exit 2
          fi
          if ! [[ "${branch}" =~ ^[A-Za-z0-9._/-]+$ ]] || [[ "${branch}" == *".."* ]] || [[ "${branch}" == /* ]] || [[ "${branch}" == */ ]]; then
            echo "Invalid Cloudflare Pages production branch"
            exit 2
          fi
          base_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          get_status=$(curl --silent --show-error --output /tmp/pages-project.json --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${base_url}/${project}")
          if [ "${get_status}" = "200" ]; then
            jq -e --arg branch "${branch}" '.success == true and .result.production_branch == $branch' /tmp/pages-project.json > /dev/null
            echo "Cloudflare Pages project already exists with the requested production branch."
            exit 0
          fi
          if [ "${get_status}" != "404" ]; then
            cat /tmp/pages-project.json
            exit 1
          fi
          jq -n --arg name "${project}" --arg branch "${branch}" '{name: $name, production_branch: $branch}' > /tmp/pages-create-request.json
          create_status=$(curl --silent --show-error --output /tmp/pages-create-response.json --write-out "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @/tmp/pages-create-request.json \
            "${base_url}")
          if [ "${create_status}" != "200" ] && [ "${create_status}" != "201" ]; then
            cat /tmp/pages-create-response.json
            exit 1
          fi
          jq -e --arg name "${project}" --arg branch "${branch}" '.success == true and .result.name == $name and .result.production_branch == $branch' /tmp/pages-create-response.json > /dev/null
          echo "Created Cloudflare Pages project ${project}."

  worker-release:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.task == 'worker-deploy' &&
      inputs.release_sha != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout exact release head
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}

      - name: Verify exact release identity
        run: test "$(git rev-parse HEAD)" = "${{ inputs.release_sha }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            lensically-worker/package-lock.json
            lensically-web/package-lock.json

      - name: Restore worker dependencies
        id: release_worker_cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: steps.release_worker_cache.outputs.cache-hit != 'true'
        working-directory: lensically-worker
        run: npm ci

      - name: Restore web dependencies
        id: release_web_cache
        uses: actions/cache@v4
        with:
          path: lensically-web/node_modules
          key: ${{ runner.os }}-node22-web-${{ hashFiles('lensically-web/package-lock.json') }}

      - name: Install web dependencies
        if: steps.release_web_cache.outputs.cache-hit != 'true'
        working-directory: lensically-web
        run: npm ci

      - name: Build exact-head web product
        working-directory: lensically-web
        run: npm run build:cf

      - name: Run exact-head release gates
        working-directory: lensically-worker
        run: |
          set -euo pipefail
          node scripts/release-preflight.mjs
          npx tsc --noEmit
          npm run test -- --run manifest-autonomous-cycle.test.ts --reporter=dot --bail=1
          npm run test -- --run test/systemDirectory.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/threadsPublishService.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot --bail=1
          npm run test -- --run test/operatorMode.spec.ts --testNamePattern="advertises the curated direct typed Main surface and concise instructions|makes the static router the only public action path|routes operational status and engineering intents deterministically away from content procedures|routes bounded known-file repository search through the main Execution Kernel without Recovery|validates complete Execution Kernel routes without mutations|rejects an MCP session created by a previous Worker deployment before routing|lists only the active static MCP registry and concise instructions|arms, executes, and re-arms the independent scheduled-post alarm with shared cron health|recovers a known Saved Pattern into complete published-post lineage|reconciles prepare_manifest_autonomous_cycle again with the same durable operation id" --reporter=dot --bail=1

      - name: Deploy exact validated Worker head
        working-directory: lensically-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:$(git rev-parse HEAD)"

      - name: Deploy exact validated web head
        working-directory: lensically-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.toml

      - name: Verify Wrangler-managed cron triggers
        working-directory: lensically-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          schedules_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/lensically-worker/schedules"
          curl --fail-with-body --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${schedules_url}" > /tmp/lensically-cron-get.json
          jq -e '.success == true' /tmp/lensically-cron-get.json > /dev/null
          expected_crons=$(node scripts/release-preflight.mjs --print-crons | sort)
          actual_crons=$(jq -r '.result.schedules[].cron' /tmp/lensically-cron-get.json | sort)
          test "${actual_crons}" = "${expected_crons}"

      - name: Verify production runtime, scheduler, and intelligence product
        run: |
          set -euo pipefail
          expected_sha="$(git rev-parse HEAD)"
          verified=false
          for attempt in $(seq 1 12); do
            if curl --fail-with-body --silent --show-error "https://api.lensically.com/api/operator/health" > /tmp/lensically-runtime-health.json \
              && jq -e --arg sha "${expected_sha}" '.status == "ok" and .commit_sha == $sha and .execution_kernel.public_gateway == "direct_typed_tools" and (.live_tool_count >= 87)' /tmp/lensically-runtime-health.json > /dev/null \
              && curl --fail-with-body --silent --show-error "https://api.lensically.com/api/operator/scheduler-health" > /tmp/lensically-scheduler-health.json \
              && jq -e '.enabled == true and .healthy == true and .operational == true and .heartbeat_fresh == true and (.control.mode == "normal") and (.current_overdue_count == 0)' /tmp/lensically-scheduler-health.json > /dev/null \
              && curl --fail-with-body --silent --show-error "https://lensically.com/intelligence" > /tmp/lensically-intelligence.html \
              && grep -q "Manifest Intelligence" /tmp/lensically-intelligence.html; then
              verified=true
              break
            fi
            sleep 5
          done
          if [ "${verified}" != "true" ]; then
            cat /tmp/lensically-runtime-health.json || true
            cat /tmp/lensically-scheduler-health.json || true
            head -c 2000 /tmp/lensically-intelligence.html || true
            exit 1
          fi
