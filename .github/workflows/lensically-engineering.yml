name: Lensically Engineering
# [operator-tests] exact-head fallback runs focused Operator diagnostics before the final full regression suite.
# A commit message containing [operator-tests] runs bounded validation when workflow dispatch is client-blocked.
run-name: Lensically ${{ inputs.task }} · ${{ inputs.release_id || github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - "lensically-recovery-worker/**"
      - ".github/workflows/lensically-engineering.yml"
  workflow_dispatch:
    inputs:
      task:
        description: Engineering task to run
        required: true
        default: typecheck
        type: choice
        options:
                    - typecheck
          - system-directory-tests
          - operator-tests
          - gpt-memory-tests
          - worker-deploy
      release_id:
        description: Optional exact-SHA release identity
        required: false
        default: ""
        type: string
      release_sha:
        description: Exact commit SHA to validate and deploy
        required: false
        default: ""
        type: string

concurrency:
  group: lensically-engineering-${{ inputs.task || 'recovery-push' }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  worker:
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (contains(github.event.head_commit.message, '[operator-tests]') || contains(github.event.head_commit.message, '[system-directory-tests]'))) }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha || github.sha }}

      - name: Verify exact release identity
        if: ${{ inputs.task == 'worker-deploy' && inputs.release_sha != '' }}
        run: test "$(git rev-parse HEAD)" = "${{ inputs.release_sha }}"

      - name: Fast release preflight
        id: release_preflight
        if: ${{ inputs.task == 'worker-deploy' }}
        continue-on-error: true
        run: |
          set -o pipefail
          node scripts/release-preflight.mjs 2>&1 | tee /tmp/lensically-release-preflight.log

      - name: Surface release preflight failure
        if: ${{ steps.release_preflight.outcome == 'failure' }}
        run: |
          diagnostic=$(tail -n 120 /tmp/lensically-release-preflight.log | tr '\n' ' ' | sed 's/%/%25/g')
          echo "::error title=Release preflight failure::$diagnostic"
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Restore worker dependencies
        id: worker-dependency-cache
        uses: actions/cache@v4
        with:
          path: lensically-worker/node_modules
          key: ${{ runner.os }}-node22-worker-${{ hashFiles('lensically-worker/package-lock.json') }}

      - name: Install worker dependencies
        if: ${{ steps.worker-dependency-cache.outputs.cache-hit != 'true' }}
        run: npm ci

            - name: Typecheck
        if: ${{ inputs.task == 'typecheck' || inputs.task == 'system-directory-tests' || inputs.task == 'worker-deploy' || (github.event_name == 'push' && (contains(github.event.head_commit.message, '[operator-tests]') || contains(github.event.head_commit.message, '[system-directory-tests]'))) }}
        run: npx tsc --noEmit

      - name: System Directory tests
        id: system_directory_tests
        if: ${{ inputs.task == 'system-directory-tests' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[system-directory-tests]')) }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test -- --run test/systemDirectory.spec.ts --reporter=dot --bail=1 2>&1 | tee /tmp/lensically-system-directory-tests.log

      - name: Surface System Directory test failure
        if: ${{ steps.system_directory_tests.outcome == 'failure' }}
        run: |
          failure_lines=$(grep -aE '(^|[[:space:]])(×|→)|AssertionError|expected .*|received|FAIL|Test Files|Tests[[:space:]]' /tmp/lensically-system-directory-tests.log | tail -n 80 || true)
          if [ -z "$failure_lines" ]; then
            failure_lines=$(tail -n 80 /tmp/lensically-system-directory-tests.log)
          fi
          diagnostic=$(printf '%s\n' "$failure_lines" | tr '\n' ' ' | sed 's/%/%25/g')
          echo "::error title=System Directory test failure::$diagnostic"
          exit 1

      - name: Fast Operator release gate
        id: operator_release_gate
        if: ${{ inputs.task == 'worker-deploy' }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test -- --run test/operatorMode.spec.ts --testNamePattern="routes operational status and engineering intents deterministically away from content procedures" --reporter=dot --bail=1 2>&1 | tee /tmp/lensically-operator-release-gate.log

      - name: Surface fast Operator release-gate failure
        if: ${{ steps.operator_release_gate.outcome == 'failure' }}
        run: |
          diagnostic=$(tail -n 80 /tmp/lensically-operator-release-gate.log | tr '\n' ' ' | sed 's/%/%25/g')
          echo "::error title=Fast Operator release gate failure::$diagnostic"
          exit 1

      - name: Full Operator MCP tests
        id: operator_tests
        if: ${{ inputs.task == 'operator-tests' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[operator-tests]')) }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test -- --run test/operatorMode.spec.ts --reporter=dot --bail=1 2>&1 | tee /tmp/lensically-operator-tests.log

      - name: Surface full Operator test failure
        if: ${{ steps.operator_tests.outcome == 'failure' }}
        run: |
          failure_lines=$(grep -aE '(^|[[:space:]])(×|→)|AssertionError|expected .*|received|FAIL|Test Files|Tests[[:space:]]' /tmp/lensically-operator-tests.log | tail -n 80 || true)
          if [ -z "$failure_lines" ]; then
            failure_lines=$(tail -n 80 /tmp/lensically-operator-tests.log)
          fi
          diagnostic=$(printf '%s\n' "$failure_lines" | tr '\n' ' ' | sed 's/%/%25/g')
          echo "::error title=Full Operator MCP test failure::$diagnostic"
          exit 1

      - name: GPT memory tests
        id: gpt_memory_tests
        if: ${{ inputs.task == 'gpt-memory-tests' || inputs.task == 'worker-deploy' }}
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=verbose 2>&1 | tee /tmp/lensically-gpt-memory-tests.log

      - name: Surface GPT memory test failure
        if: ${{ steps.gpt_memory_tests.outcome == 'failure' }}
        run: |
          diagnostic=$(tail -n 120 /tmp/lensically-gpt-memory-tests.log | tr '\n' ' ' | sed 's/%/%25/g')
          echo "::error title=GPT memory test failure::$diagnostic"
          exit 1

      - name: Deploy worker
        if: ${{ inputs.task == 'worker-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:$(git rev-parse HEAD)"

      - name: Verify Wrangler-managed cron triggers
        if: ${{ inputs.task == 'worker-deploy' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          schedules_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/lensically-worker/schedules"
          curl --fail-with-body --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${schedules_url}" > /tmp/lensically-cron-get.json
          jq -e '.success == true' /tmp/lensically-cron-get.json > /dev/null
          expected_crons=$(node scripts/release-preflight.mjs --print-crons | sort)
          actual_crons=$(jq -r '.result.schedules[].cron' /tmp/lensically-cron-get.json | sort)
          test "${actual_crons}" = "${expected_crons}"
          echo "Wrangler-managed Cloudflare cron triggers verified from wrangler.jsonc without mutation."

      - name: Verify safe scheduler activation state
        if: ${{ inputs.task == 'worker-deploy' }}
        run: |
          set -euo pipefail
          scheduler_url="https://api.lensically.com/api/operator/scheduler-health"
          scheduler_safe=false
          for attempt in $(seq 1 12); do
            if curl --fail-with-body --silent --show-error "${scheduler_url}" > /tmp/lensically-scheduler-health.json \
              && jq -e '.enabled == true and .healthy == true and .operational == true and .heartbeat_fresh == true and (.control.mode == "normal") and ((.current_overdue_count | type) == "number") and (.current_overdue_count == 0)' /tmp/lensically-scheduler-health.json > /dev/null; then
              scheduler_safe=true
              break
            fi
            echo "Waiting for scheduler-health propagation (${attempt}/12)..."
            sleep 5
          done
          if [ "${scheduler_safe}" != "true" ]; then
            echo "Scheduler activation state did not become safely verifiable."
            cat /tmp/lensically-scheduler-health.json || true
            exit 1
          fi
          echo "Scheduler activation state verified: operational normal mode with an empty overdue queue."


  recovery:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-recovery-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-recovery-worker/package-lock.json

      - name: Restore recovery dependencies
        id: recovery-dependency-cache
        uses: actions/cache@v4
        with:
          path: lensically-recovery-worker/node_modules
          key: ${{ runner.os }}-node22-recovery-${{ hashFiles('lensically-recovery-worker/package-lock.json') }}

      - name: Install recovery dependencies
        if: ${{ steps.recovery-dependency-cache.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Typecheck recovery worker
        id: recovery-typecheck
        continue-on-error: true
        run: npx tsc --noEmit 2>&1 | tee /tmp/lensically-recovery-typecheck.log

      - name: Persist recovery typecheck diagnostics
        if: ${{ steps.recovery-typecheck.outcome == 'failure' }}
        working-directory: ${{ github.workspace }}
        run: |
          cp /tmp/lensically-recovery-typecheck.log RECOVERY_TYPECHECK_LOG.txt
          git config user.name "lensically-recovery-ci"
          git config user.email "lensically-recovery-ci@users.noreply.github.com"
          git add RECOVERY_TYPECHECK_LOG.txt
          git commit -m "Record recovery typecheck failure [skip ci]"
          git push origin HEAD:main
          exit 1

      - name: Deploy recovery worker
        if: ${{ steps.recovery-typecheck.outcome == 'success' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:${{ github.sha }}"
