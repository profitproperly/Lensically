name: Lensically Engineering

on:
  workflow_dispatch:
    inputs:
      task:
        description: Engineering task to run
        required: true
        default: typecheck
        type: choice
        options:
          - typecheck
          - operator-tests
          - gpt-memory-tests
          - worker-deploy

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lensically-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lensically-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        if: ${{ inputs.task == 'typecheck' || inputs.task == 'worker-deploy' }}
        run: npx tsc --noEmit

      - name: Operator MCP tests
        if: ${{ inputs.task == 'operator-tests' || inputs.task == 'worker-deploy' }}
        run: npm run test -- --run test/operatorMode.spec.ts --reporter=dot

      - name: GPT memory tests
  if: ${{ inputs.task == 'gpt-memory-tests' || inputs.task == 'worker-deploy' }}
  run: npm run test -- --run test/gptMemoryRoutes.spec.ts --reporter=dot

- name: Deploy worker
  if: ${{ inputs.task == 'worker-deploy' }}
  env:
    CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:$(git rev-parse HEAD)"

- name: Reconcile and verify cron triggers
  if: ${{ inputs.task == 'worker-deploy' }}
  env:
    CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  run: |
    set -euo pipefail
    schedules_url="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/lensically-worker/schedules"
    expected_payload='[{"cron":"* * * * *"},{"cron":"0 */12 * * *"},{"cron":"1 4,5 * * *"},{"cron":"59 3,4 * * *"}]'
    curl --fail-with-body --silent --show-error --request PUT --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" --header "Content-Type: application/json" --data "${expected_payload}" "${schedules_url}" > /tmp/lensically-cron-put.json
    curl --fail-with-body --silent --show-error --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${schedules_url}" > /tmp/lensically-cron-get.json
    jq -e '.success == true' /tmp/lensically-cron-put.json > /dev/null
    jq -e '.success == true' /tmp/lensically-cron-get.json > /dev/null
    expected_crons=$(printf '%s\n' '* * * * *' '0 */12 * * *' '1 4,5 * * *' '59 3,4 * * *' | sort)
    actual_crons=$(jq -r '.result.schedules[].cron' /tmp/lensically-cron-get.json | sort)
    test "${actual_crons}" = "${expected_crons}"
    echo "Cloudflare cron triggers reconciled and verified."

      - name: Install recovery dependencies
        if: ${{ inputs.task == 'worker-deploy' }}
        working-directory: lensically-recovery-worker
        run: npm ci

      - name: Typecheck recovery worker
        if: ${{ inputs.task == 'worker-deploy' }}
        working-directory: lensically-recovery-worker
        run: npx tsc --noEmit

      - name: Deploy recovery worker
        if: ${{ inputs.task == 'worker-deploy' }}
        working-directory: lensically-recovery-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.jsonc --var "LENSICALLY_COMMIT_SHA:${{ github.sha }}"
